<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>3D AR Jump Duck - 極致流暢半透明版</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: '微軟正黑體', sans-serif; }
        
        #video-element { position: absolute; opacity: 0; width: 1px; height: 1px; pointer-events: none; }
        #bg-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        #score-boards-container {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: center; gap: 20px;
            pointer-events: none; z-index: 10;
        }
        .score-board {
            padding: 10px 20px; border-radius: 15px; background: rgba(0,0,0,0.8);
            font-size: 24px; text-align: center; font-weight: bold; border: 3px solid;
            min-width: 140px; text-shadow: 0 0 5px #000;
        }
        
        #center-msg {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            color: #00ff00; font-size: 40px; font-weight: bold; text-shadow: 0 0 15px #000; text-align: center;
        }

        #leaderboard {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.85); color: white; padding: 20px;
            border-radius: 15px; border: 3px solid #ffeb3b; min-width: 280px; font-size: 20px; pointer-events: auto;
        }
        #leaderboard h3 { margin: 0 0 10px 0; color: #ffeb3b; font-size: 22px; text-align: center; }

        #record-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #fff; color: #333; padding: 40px; border-radius: 20px; text-align: center;
            z-index: 200; pointer-events: auto; display: none; border: 5px solid #ffeb3b; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        #record-modal h2 { margin: 0 0 20px; color: #d35400; font-size: 32px; }
        #record-modal input { font-size: 24px; padding: 10px; margin: 10px; width: 80%; border-radius: 10px; border: 2px solid #ccc; text-align: center; }
        #save-btn { background: #27ae60; color: white; border: none; padding: 15px 30px; font-size: 24px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }

        #setup-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 300; display: flex; flex-direction: column;
            justify-content: center; align-items: center; pointer-events: auto;
        }
        #setup-screen h1 { color: #ffeb3b; font-size: 60px; margin-bottom: 20px; text-shadow: 0 0 20px #e67e22; }
        #setup-screen p { color: white; font-size: 30px; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 20px; }
        .player-btn {
            background: #3498db; color: white; border: none; padding: 20px 40px;
            font-size: 30px; font-weight: bold; border-radius: 15px; cursor: pointer;
            transition: 0.3s; border: 3px solid transparent;
        }
        .player-btn:hover { background: #2980b9; border-color: #fff; transform: scale(1.1); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <video id="video-element" playsinline autoplay muted></video>
    <canvas id="bg-canvas"></canvas>
    <div id="canvas-container"></div>
    
    <div id="setup-screen">
        <h1>🦆 AR Jump Duck</h1>
        <p>請選擇玩家人數</p>
        <div class="btn-group">
            <button class="player-btn" onclick="startGameSetup(1)">1 人</button>
            <button class="player-btn" onclick="startGameSetup(2)">2 人</button>
            <button class="player-btn" onclick="startGameSetup(3)">3 人</button>
            <button class="player-btn" onclick="startGameSetup(4)">4 人</button>
        </div>
    </div>

    <div class="ui-layer">
        <div id="score-boards-container"></div>
        <div id="center-msg" class="hidden">準備中...</div>
        <div id="leaderboard" class="hidden">
            <h3>🏆 榮譽榜 (前五名)</h3>
            <div id="score-list">尚無紀錄</div>
        </div>
    </div>

    <div id="record-modal">
        <h2 id="modal-title">🎊 破紀錄了！</h2>
        <p style="font-size: 22px; margin: 0 0 15px 0;">請留下你的光榮紀錄：</p>
        <input type="text" id="class-id" placeholder="範例：5C" maxlength="10"><br>
        <input type="text" id="student-num" placeholder="學號：12" maxlength="10"><br>
        <button id="save-btn" onclick="saveRecord()">儲存紀錄</button>
    </div>

    <script>
        const videoElement = document.getElementById('video-element');
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const msgElement = document.getElementById('center-msg');
        const recordModal = document.getElementById('record-modal');
        const setupScreen = document.getElementById('setup-screen');
        const scoreContainer = document.getElementById('score-boards-container');
        const leaderboardUI = document.getElementById('leaderboard');
        
        let gameState = "INIT"; 
        let beamSpeed = 1.0;    
        const gravity = 60.0;
        const jumpForce = 25.0;
        
        let maxPlayers = 2; 
        let players = {};
        let activePlayers = {}; 
        
        const PLAYER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f'];
        const PLAYER_POINTS = ['#ff7675', '#74b9ff', '#55efc4', '#ffeaa7'];
        const PLAYER_NAMES  = ['P1 (紅)', 'P2 (藍)', 'P3 (綠)', 'P4 (黃)'];

        let highScores = JSON.parse(localStorage.getItem('ar3DDuckScores')) || [];

        let scene, camera, renderer;
        let beam, platform;
        const clock = new THREE.Clock();
        const baseHeight = 1;

        let detector;
        let lastVideoTime = -1;
        let currentPoses = [];

        function resizeCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startGameSetup(num) {
            maxPlayers = num;
            setupScreen.style.display = "none";
            msgElement.innerHTML = "⏳ 載入 AI 系統中...";
            msgElement.classList.remove("hidden");
            
            players = {};
            activePlayers = {};
            scoreContainer.innerHTML = '';

            for (let i = 1; i <= maxPlayers; i++) {
                activePlayers[i] = null;
                players[i] = { score: 0, prevY: 0, isJumping: false, isDead: false, mesh: null, angle: 0, nextScoreAngle: 0 };
                
                let div = document.createElement("div");
                div.className = "score-board";
                div.style.borderColor = PLAYER_COLORS[i-1];
                div.style.color = PLAYER_COLORS[i-1];
                div.innerHTML = `${PLAYER_NAMES[i-1]}<br><span id="s${i}">0</span>`;
                scoreContainer.appendChild(div);
            }

            initSystem();
        }

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            if(scene) container.innerHTML = '';
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 25, 30);
            camera.lookAt(0, 0, 0);

            // 關閉 antialias 並取消陰影，極致提升效能
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false }); 
            renderer.setClearColor(0x000000, 0); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            // 🔥 關閉陰影運算以求流暢
            renderer.shadowMap.enabled = false; 
            container.appendChild(renderer.domElement);

            // 增強環境光，彌補沒有陰影的立體感
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 30, 20);
            scene.add(dirLight);

            // 🔥 場地改為半透明玻璃材質，多邊形數量降到 24 節省效能
            const platGeo = new THREE.CylinderGeometry(16, 16, 1, 24);
            const platMat = new THREE.MeshStandardMaterial({ 
                color: 0x555555, 
                roughness: 0.2, 
                transparent: true, 
                opacity: 0.4 // 40% 不透明度
            });
            platform = new THREE.Mesh(platGeo, platMat);
            scene.add(platform);

            const pivotGeo = new THREE.CylinderGeometry(1.5, 1.5, 2, 16);
            const pivotMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
            const pivot = new THREE.Mesh(pivotGeo, pivotMat);
            pivot.position.y = 1;
            scene.add(pivot);

            beam = new THREE.Group();
            const beamMeshGeo = new THREE.BoxGeometry(16, 1.5, 1.5);
            const beamMeshMat = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
            const beamMesh = new THREE.Mesh(beamMeshGeo, beamMeshMat);
            beamMesh.position.set(8, 0, 0); 
            beam.add(beamMesh);
            beam.position.y = 1.5;
            scene.add(beam);

            function createDuck(color, px, pz) {
                const geo = new THREE.BoxGeometry(2, 2, 2);
                const mat = new THREE.MeshStandardMaterial({ color: color });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(px, baseHeight, pz); 
                scene.add(mesh);
                return mesh;
            }

            const radius = 13;
            const anglesDict = {
                1: [Math.PI / 2],
                2: [3 * Math.PI / 4, Math.PI / 4],
                3: [5 * Math.PI / 6, Math.PI / 2, Math.PI / 6],
                4: [7 * Math.PI / 8, 5 * Math.PI / 8, 3 * Math.PI / 8, Math.PI / 8]
            };
            const currentAngles = anglesDict[maxPlayers];

            for (let i = 1; i <= maxPlayers; i++) {
                let angle = currentAngles[i-1];
                let px = radius * Math.cos(angle);
                let pz = radius * Math.sin(angle);
                
                players[i].angle = angle;
                players[i].mesh = createDuck(PLAYER_COLORS[i-1], px, pz);
            }
        }

        // 🔥 效能優化：移除所有連線繪製，只畫放大版的「骨架發光點」
        function drawSkeletons(poses, scaleX, scaleY) {
            poses.forEach((pose) => {
                let assignedSlot = null;
                for (let i = 1; i <= maxPlayers; i++) {
                    if (activePlayers[i] === pose.id) assignedSlot = i;
                }
                if (!assignedSlot) return; 

                bgCtx.fillStyle = PLAYER_POINTS[assignedSlot-1];

                pose.keypoints.forEach(p => {
                    if (p.score > 0.3) {
                        bgCtx.beginPath();
                        bgCtx.arc(p.x * scaleX, p.y * scaleY, 7, 0, 2 * Math.PI); // 點放大到 7px
                        bgCtx.fill();
                    }
                });
            });
        }

        function bgRenderLoop() {
            requestAnimationFrame(bgRenderLoop);
            if (videoElement.readyState >= 2) {
                const scaleX = bgCanvas.width / videoElement.videoWidth;
                const scaleY = bgCanvas.height / videoElement.videoHeight;

                bgCtx.save();
                bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
                bgCtx.translate(bgCanvas.width, 0);
                bgCtx.scale(-1, 1);
                
                bgCtx.globalAlpha = 0.5;
                bgCtx.drawImage(videoElement, 0, 0, bgCanvas.width, bgCanvas.height);
                bgCtx.globalAlpha = 1.0;

                if (currentPoses.length > 0) {
                    drawSkeletons(currentPoses, scaleX, scaleY);
                }
                bgCtx.restore();
            }
        }

        async function initSystem() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
            videoElement.srcObject = stream;
            
            await new Promise((resolve) => { 
                videoElement.onloadedmetadata = () => { videoElement.play(); resolve(); }; 
            });

            await tf.ready();
            detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, {
                modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
                enableTracking: true 
            });
            
            initThreeJS();
            
            leaderboardUI.classList.remove("hidden");
            updateLeaderboardUI();
            
            gameState = "WAITING_FOR_JUMP";
            msgElement.innerHTML = "載入完成！<br><span style='color:yellow'>任一玩家跳起以開始</span>";
            msgElement.style.color = "#00ff00";
            
            bgRenderLoop();
            detectPoseLoop();
            requestAnimationFrame(threeJSLoop);
        }

        async function detectPoseLoop() {
            if (videoElement.currentTime !== lastVideoTime && gameState !== "INIT") {
                lastVideoTime = videoElement.currentTime;
                
                const poses = await detector.estimatePoses(videoElement);
                let allValidPoses = poses.filter(p => p.score > 0.2);

                if (allValidPoses.length > 0) {
                    const currentIDs = allValidPoses.map(p => p.id);

                    for (let i = 1; i <= maxPlayers; i++) {
                        if (activePlayers[i] !== null && !currentIDs.includes(activePlayers[i])) {
                            activePlayers[i] = null;
                        }
                    }

                    let unassignedPoses = allValidPoses.filter(p => !Object.values(activePlayers).includes(p.id));

                    if (unassignedPoses.length > 0) {
                        unassignedPoses.sort((a, b) => {
                            let aX = (a.keypoints[5].x + a.keypoints[6].x) / 2;
                            let bX = (b.keypoints[5].x + b.keypoints[6].x) / 2;
                            return bX - aX; 
                        });

                        for (let pose of unassignedPoses) {
                            for (let i = 1; i <= maxPlayers; i++) {
                                if (activePlayers[i] === null) {
                                    activePlayers[i] = pose.id;
                                    break;
                                }
                            }
                        }
                    }

                    currentPoses = allValidPoses.filter(p => Object.values(activePlayers).includes(p.id));

                    currentPoses.forEach(pose => {
                        for (let i = 1; i <= maxPlayers; i++) {
                            if (pose.id === activePlayers[i]) processPlayerInput(i, pose);
                        }
                    });
                } else {
                    currentPoses = [];
                }
            }
            // 拉高辨識頻率嘗試，若手機發熱可降回 1000/30
            setTimeout(detectPoseLoop, 1000 / 45); 
        }

        function processPlayerInput(playerNum, pose) {
            let leftShoulder = pose.keypoints[5];
            let rightShoulder = pose.keypoints[6];
            if (leftShoulder.score < 0.3 || rightShoulder.score < 0.3) return;

            let currentY = (leftShoulder.y + rightShoulder.y) / 2;
            let p = players[playerNum];

            if (p.prevY !== 0 && (p.prevY - currentY) > 20) { 
                if (gameState === "WAITING_FOR_JUMP") {
                    startGame(); 
                } 
                else if (gameState === "PLAYING" && !p.isJumping && !p.isDead) {
                    p.isJumping = true;
                    p.mesh.userData.velocity = jumpForce; 
                }
            }
            p.prevY = currentY;
        }

        function getNextScoreAngle(currentRotation, playerAngle) {
            let targetLocal = (Math.PI * 2 - playerAngle) % (Math.PI * 2);
            let currentLocal = currentRotation % (Math.PI * 2);
            let laps = Math.floor(currentRotation / (Math.PI * 2));

            if (targetLocal < currentLocal - 0.01) {
                laps++;
            }

            return (laps * Math.PI * 2) + targetLocal + 0.3; 
        }

        function startGame() {
            gameState = "PLAYING";
            msgElement.innerText = "遊戲開始！";
            msgElement.style.color = "#ffeb3b";
            beamSpeed = 1.0;
            
            // 🔥 【修正點】：將初始角度從 Math.PI 改為 0
            // 這樣杆子會從畫面右側（0度）開始，而不是直接在左側玩家（約157度）旁邊，
            // 給所有玩家足夠的視覺緩衝時間（約2~3秒）準備起跳。
            beam.rotation.y = 0;

            for(let i = 1; i <= maxPlayers; i++) {
                players[i].nextScoreAngle = getNextScoreAngle(beam.rotation.y, players[i].angle);
            }

            setTimeout(() => {
                if (gameState === "PLAYING") msgElement.classList.add("hidden");
            }, 1500);
        }

        function threeJSLoop() {
            requestAnimationFrame(threeJSLoop);
            const dt = clock.getDelta();

            if (gameState === "PLAYING") {
                beam.rotation.y += beamSpeed * dt;
                beamSpeed += 0.1 * dt;

                let allDead = true;
                
                let localBeamAngle = (beam.rotation.y % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
                let physicalBeamAngle = (Math.PI * 2 - localBeamAngle) % (Math.PI * 2);

                for (let i = 1; i <= maxPlayers; i++) {
                    let p = players[i];
                    if (p.isDead) continue;
                    allDead = false;

                    if (p.isJumping) {
                        p.mesh.position.y += p.mesh.userData.velocity * dt;
                        p.mesh.userData.velocity -= gravity * dt;
                        if (p.mesh.position.y <= baseHeight) {
                            p.mesh.position.y = baseHeight;
                            p.isJumping = false;
                        }
                    }

                    let diff = Math.abs(physicalBeamAngle - p.angle);
                    if (diff > Math.PI) diff = 2 * Math.PI - diff; 

                    if (diff < 0.2) {
                        if (p.mesh.position.y < baseHeight + 2.0) {
                            p.isDead = true;
                            p.mesh.scale.y = 0.2; 
                            p.mesh.material.color.setHex(0x555555); 
                            showDeathMsg(`💥 P${i} 淘汰！`);
                        }
                    }

                    if (beam.rotation.y > p.nextScoreAngle && !p.isDead) {
                        p.score += 10;
                        document.getElementById(`s${i}`).innerText = p.score;
                        p.nextScoreAngle += 2 * Math.PI; 
                    }
                }

                if (allDead) {
                    gameState = "GAMEOVER";
                    checkHighScores();
                }
            }

            if(renderer && scene && camera) renderer.render(scene, camera);
        }

        function showDeathMsg(text) {
            msgElement.innerText = text;
            msgElement.style.color = "#e74c3c";
            msgElement.classList.remove("hidden");
        }

        function checkHighScores() {
            let maxScore = 0;
            let topPlayer = 1;
            for(let i = 1; i <= maxPlayers; i++) {
                if (players[i].score > maxScore) {
                    maxScore = players[i].score;
                    topPlayer = i;
                }
            }
            
            const isTopFive = maxScore > 0 && (highScores.length < 5 || maxScore > highScores[highScores.length - 1].score);

            if (isTopFive) {
                msgElement.innerText = "🏆 產生新紀錄！";
                msgElement.style.color = "#ffeb3b";
                
                document.getElementById("modal-title").innerText = `🎊 P${topPlayer} 破紀錄了！`;
                recordModal.dataset.score = maxScore;
                recordModal.dataset.player = topPlayer;
                recordModal.style.display = "block";
            } else {
                msgElement.innerText = "全體淘汰！3 秒後重置...";
                msgElement.style.color = "#fff";
                setTimeout(resetGame, 3000);
            }
        }

        function saveRecord() {
            const classVal = document.getElementById("class-id").value || "未知班別";
            const numVal = document.getElementById("student-num").value || "??";
            const scoreVal = parseInt(recordModal.dataset.score);
            const playerNum = recordModal.dataset.player;

            const newRecord = {
                label: `P${playerNum} - ${classVal} (${numVal})`,
                score: scoreVal
            };

            highScores.push(newRecord);
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 5); 

            localStorage.setItem('ar3DDuckScores', JSON.stringify(highScores));

            recordModal.style.display = "none";
            document.getElementById("class-id").value = "";
            document.getElementById("student-num").value = "";

            updateLeaderboardUI();
            resetGame();
        }

        function updateLeaderboardUI() {
            const scoreListDiv = document.getElementById("score-list");
            if (highScores.length === 0) {
                scoreListDiv.innerHTML = "尚無紀錄";
                return;
            }
            scoreListDiv.innerHTML = highScores.map((item, i) => 
                `<div style="margin-bottom:6px;">${i+1}. ${item.label} - <span style="color:#ffeb3b; font-weight:bold;">${item.score}</span></div>`
            ).join('');
        }

        function resetGame() {
            for (let i = 1; i <= maxPlayers; i++) {
                players[i].isDead = false;
                players[i].score = 0;
                document.getElementById(`s${i}`).innerText = "0";
                
                players[i].mesh.scale.y = 1;
                players[i].mesh.position.y = baseHeight;
                players[i].mesh.material.color.set(PLAYER_COLORS[i-1]);
            }
            
            // 🔥 【修正點】：重製時的初始角度也改為 0
            beam.rotation.y = 0;
            
            gameState = "WAITING_FOR_JUMP";
            msgElement.innerHTML = "重新載入！<br><span style='color:yellow'>任一玩家跳起以開始</span>";
            msgElement.style.color = "#00ff00";
            msgElement.classList.remove("hidden");
        }
    </script>
</body>
</html>
